<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samarth Melghat</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, Helvetica, sans-serif;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            color:white;
            text-align:center;
        }

        .container{
            max-width:700px;
            padding:40px;
        }

        h1{
            font-size:64px;
            margin-bottom:20px;
            letter-spacing:2px;
        }

        h2{
            font-size:28px;
            color:#f9c74f;
            margin-bottom:20px;
        }

        p{
            font-size:20px;
            line-height:1.6;
            color:#ddd;
        }

        .divider{
            width:120px;
            height:4px;
            background:#f9c74f;
            margin:30px auto;
            border-radius:10px;
        }

        footer{
            margin-top:50px;
            color:#bbbbbb;
            font-size:15px;
        }

        @media(max-width:768px){

            h1{
                font-size:42px;
            }

            h2{
                font-size:22px;
            }

            p{
                font-size:17px;
            }
        }

    </style>

</head>

<body>

<div class="container">

    <h1>🚧 Coming Soon</h1>

    <h2>Samarth Melghat</h2>

    <div class="divider"></div>

    <p>
        We are working on something meaningful for the development of
        <strong>Melghat</strong>.
    </p>

    <p style="margin-top:20px;">
        Our website will be launching soon with information about our
        initiatives, projects, and vision.
    </p>

    <footer>
        © 2026 Samarth Melghat. All Rights Reserved.
    </footer>

</div>

</body>
</html>
